  <line x1="288.0" y1="60" x2="288.0" y2="300" stroke="#1e293b" stroke-dasharray="2 4" stroke-width="1" />
  <text x="364.0" y="315" class="chart-label main-text" text-anchor="middle">2048</text>
  <line x1="364.0" y1="60" x2="364.0" y2="300" stroke="#1e293b" stroke-dasharray="2 4" stroke-width="1" />
  <text x="440.0" y="315" class="chart-label main-text" text-anchor="middle">4096</text>
  <text x="250" y="328" fill="#94a3b8" font-size="10" text-anchor="middle" font-weight="600" class="main-text">Sequence Length (N)</text>
