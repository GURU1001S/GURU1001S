  <text x="136.0" y="315" class="chart-label main-text" text-anchor="middle">256</text>
  <line x1="136.0" y1="60" x2="136.0" y2="300" stroke="#1e293b" stroke-dasharray="2 4" stroke-width="1" />
  <text x="212.0" y="315" class="chart-label main-text" text-anchor="middle">512</text>
  <line x1="212.0" y1="60" x2="212.0" y2="300" stroke="#1e293b" stroke-dasharray="2 4" stroke-width="1" />
