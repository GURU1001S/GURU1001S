    .chart-label { font-size: 9px; fill: #64748b; }
    .legend-text { font-size: 10px; font-weight: 600; }
  </style>
  <!-- Background -->
  <rect width="100%" height="100%" fill="#070a13" />
  <!-- Grid Lines -->
  <line x1="60" y1="60" x2="440" y2="60" stroke="#1e293b" stroke-width="1" />
  <line x1="60" y1="180" x2="440" y2="180" stroke="#1e293b" stroke-dasharray="2 4" stroke-width="1" />
  <line x1="60" y1="300" x2="440" y2="300" stroke="#1e293b" stroke-width="1" />
  <line x1="60" y1="60" x2="60" y2="300" stroke="#1e293b" stroke-width="1" />
  <line x1="440" y1="60" x2="440" y2="300" stroke="#1e293b" stroke-width="1" />
