    <rect x="180" width="8" height="8" rx="2" fill="#06b6d4" />
    <text x="194" y="8" fill="#06b6d4" class="legend-text main-text">TICSC Attention O(N·K)</text>
  </g>
  <text x="52" y="64" class="chart-label main-text" text-anchor="end">27.0 ms</text>
  <text x="52" y="184" class="chart-label main-text" text-anchor="end">13.5 ms</text>
  <text x="52" y="304" class="chart-label main-text" text-anchor="end">0.0 ms</text>
  <text x="25" y="180" fill="#94a3b8" font-size="10" font-weight="600" text-anchor="middle" transform="rotate(-90 25 180)" class="main-text">Execution Time (ms)</text>
