<svg width="900" height="450" viewBox="0 0 900 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020812"/>
      <stop offset="50%" style="stop-color:#050f1a"/>
      <stop offset="100%" style="stop-color:#020812"/>
    </linearGradient>

    <!-- Cyan glow filter -->
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Strong glow -->
    <filter id="glow-strong" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Scanline filter -->
    <filter id="scanline">
      <feTurbulence type="fractalNoise" baseFrequency="0 0.08" numOctaves="1" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Clip for neural net area -->
    <clipPath id="neural-clip">
      <rect x="540" y="20" width="340" height="410"/>
    </clipPath>

    <!-- Clip for turbofan area -->
    <clipPath id="turbo-clip">
      <rect x="0" y="0" width="440" height="260"/>
    </clipPath>

    <!-- Amber gradient -->
    <linearGradient id="amber-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e0af68;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#e0af68;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e0af68;stop-opacity:0"/>
    </linearGradient>

    <!-- Cyan line gradient -->
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#00d4ff;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#00d4ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </linearGradient>

    <!-- Radial pulse -->
    <radialGradient id="pulse-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </radialGradient>

  </defs>

  <!-- ═══════════════════ BACKGROUND ═══════════════════ -->
  <rect width="900" height="450" fill="url(#bg)"/>

  <!-- Grid lines - horizontal -->
  <g opacity="0.06" stroke="#00d4ff" stroke-width="0.5">
    <line x1="0" y1="45" x2="900" y2="45"/>
    <line x1="0" y1="90" x2="900" y2="90"/>
    <line x1="0" y1="135" x2="900" y2="135"/>
    <line x1="0" y1="180" x2="900" y2="180"/>
    <line x1="0" y1="225" x2="900" y2="225"/>
    <line x1="0" y1="270" x2="900" y2="270"/>
    <line x1="0" y1="315" x2="900" y2="315"/>
    <line x1="0" y1="360" x2="900" y2="360"/>
    <line x1="0" y1="405" x2="900" y2="405"/>
  </g>
  <!-- Grid lines - vertical -->
  <g opacity="0.06" stroke="#00d4ff" stroke-width="0.5">
    <line x1="90" y1="0" x2="90" y2="450"/>
    <line x1="180" y1="0" x2="180" y2="450"/>
    <line x1="270" y1="0" x2="270" y2="450"/>
    <line x1="360" y1="0" x2="360" y2="450"/>
    <line x1="450" y1="0" x2="450" y2="450"/>
    <line x1="540" y1="0" x2="540" y2="450"/>
    <line x1="630" y1="0" x2="630" y2="450"/>
    <line x1="720" y1="0" x2="720" y2="450"/>
    <line x1="810" y1="0" x2="810" y2="450"/>
  </g>

  <!-- Scanning line animation -->
  <rect x="0" y="0" width="900" height="2" fill="url(#cyan-grad)" opacity="0.6">
    <animate attributeName="y" from="-2" to="452" dur="4s" repeatCount="indefinite" calcMode="linear"/>
    <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.05;0.95;1" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- ═══════════════════ TURBOFAN ENGINE - LEFT ═══════════════════ -->
  <!-- Engine outer casing -->
  <g clip-path="url(#turbo-clip)" opacity="0.18" stroke="#00d4ff" fill="none" stroke-width="0.8">
    <!-- Main nacelle outline -->
    <ellipse cx="200" cy="135" rx="115" ry="28" stroke-width="1.2"/>
    <!-- Fan disk -->
    <ellipse cx="200" cy="135" rx="90" ry="22"/>
    <!-- Core -->
    <ellipse cx="200" cy="135" rx="35" ry="9"/>
    <!-- Spinner -->
    <ellipse cx="200" cy="135" rx="12" ry="4"/>

    <!-- Fan blades - 12 blades -->
    <g transform="rotate(0 200 135)"><path d="M200,135 L196,50 Q200,44 204,50 Z" opacity="0.7"/></g>
    <g transform="rotate(30 200 135)"><path d="M200,135 L196,50 Q200,44 204,50 Z" opacity="0.7"/></g>
    <g transform="rotate(60 200 135)"><path d="M200,135 L196,50 Q200,44 204,50 Z" opacity="0.7"/></g>
    <g transform="rotate(90 200 135)"><path d="M200,135 L196,50 Q200,44 204,50 Z" opacity="0.7"/></g>
    <g transform="rotate(120 200 135)"><path d="M200,135 L196,50 Q200,44 204,50 Z" opacity="0.7"/></g>
    <g transform="rotate(150 200 135)"><path d="M200,135 L196,50 Q200,44 204,50 Z" opacity="0.7"/></g>
    <g transform="rotate(180 200 135)"><path d="M200,135 L196,50 Q200,44 204,50 Z" opacity="0.7"/></g>
    <g transform="rotate(210 200 135)"><path d="M200,135 L196,50 Q200,44 204,50 Z" opacity="0.7"/></g>
    <g transform="rotate(240 200 135)"><path d="M200,135 L196,50 Q200,44 204,50 Z" opacity="0.7"/></g>
    <g transform="rotate(270 200 135)"><path d="M200,135 L196,50 Q200,44 204,50 Z" opacity="0.7"/></g>
    <g transform="rotate(300 200 135)"><path d="M200,135 L196,50 Q200,44 204,50 Z" opacity="0.7"/></g>
    <g transform="rotate(330 200 135)"><path d="M200,135 L196,50 Q200,44 204,50 Z" opacity="0.7"/></g>

    <!-- Stator vanes -->
    <line x1="200" y1="113" x2="200" y2="57"/>
    <line x1="200" y1="113" x2="200" y2="57" transform="rotate(45 200 135)"/>
    <line x1="200" y1="113" x2="200" y2="57" transform="rotate(90 200 135)"/>
    <line x1="200" y1="113" x2="200" y2="57" transform="rotate(135 200 135)"/>
    <line x1="200" y1="113" x2="200" y2="57" transform="rotate(180 200 135)"/>
    <line x1="200" y1="113" x2="200" y2="57" transform="rotate(225 200 135)"/>
    <line x1="200" y1="113" x2="200" y2="57" transform="rotate(270 200 135)"/>
    <line x1="200" y1="113" x2="200" y2="57" transform="rotate(315 200 135)"/>

    <!-- Bypass duct lines -->
    <line x1="113" y1="128" x2="40" y2="128"/>
    <line x1="113" y1="142" x2="40" y2="142"/>
    <line x1="287" y1="128" x2="360" y2="128"/>
    <line x1="287" y1="142" x2="360" y2="142"/>

    <!-- Combustor rings -->
    <ellipse cx="200" cy="135" rx="52" ry="13"/>
    <ellipse cx="200" cy="135" rx="44" ry="11"/>

    <!-- Turbine section indicator marks -->
    <line x1="200" y1="122" x2="200" y2="126" transform="rotate(0 200 135)"/>
    <line x1="200" y1="122" x2="200" y2="126" transform="rotate(36 200 135)"/>
    <line x1="200" y1="122" x2="200" y2="126" transform="rotate(72 200 135)"/>
    <line x1="200" y1="122" x2="200" y2="126" transform="rotate(108 200 135)"/>
    <line x1="200" y1="122" x2="200" y2="126" transform="rotate(144 200 135)"/>
    <line x1="200" y1="122" x2="200" y2="126" transform="rotate(180 200 135)"/>
    <line x1="200" y1="122" x2="200" y2="126" transform="rotate(216 200 135)"/>
    <line x1="200" y1="122" x2="200" y2="126" transform="rotate(252 200 135)"/>
    <line x1="200" y1="122" x2="200" y2="126" transform="rotate(288 200 135)"/>
    <line x1="200" y1="122" x2="200" y2="126" transform="rotate(324 200 135)"/>
  </g>

  <!-- Pulsing center of turbofan -->
  <circle cx="200" cy="135" r="40" fill="url(#pulse-grad)" opacity="0">
    <animate attributeName="r" values="10;60;10" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- ═══════════════════ NEURAL NETWORK - RIGHT ═══════════════════ -->
  <g clip-path="url(#neural-clip)">
    <!-- Layer 1 nodes -->
    <g filter="url(#glow-cyan)">
      <!-- Input layer -->
      <circle cx="580" cy="90" r="5" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.7"/>
      <circle cx="580" cy="140" r="5" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.7"/>
      <circle cx="580" cy="190" r="5" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.7"/>
      <circle cx="580" cy="240" r="5" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.7"/>
      <circle cx="580" cy="290" r="5" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.7"/>
      <circle cx="580" cy="340" r="5" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.7"/>

      <!-- Hidden layer 1 -->
      <circle cx="660" cy="110" r="5" fill="none" stroke="#7aa2f7" stroke-width="1.2" opacity="0.7"/>
      <circle cx="660" cy="165" r="5" fill="none" stroke="#7aa2f7" stroke-width="1.2" opacity="0.7"/>
      <circle cx="660" cy="215" r="5" fill="none" stroke="#7aa2f7" stroke-width="1.2" opacity="0.7"/>
      <circle cx="660" cy="265" r="5" fill="none" stroke="#7aa2f7" stroke-width="1.2" opacity="0.7"/>
      <circle cx="660" cy="315" r="5" fill="none" stroke="#7aa2f7" stroke-width="1.2" opacity="0.7"/>

      <!-- Hidden layer 2 -->
      <circle cx="740" cy="130" r="5" fill="none" stroke="#bb9af7" stroke-width="1.2" opacity="0.7"/>
      <circle cx="740" cy="190" r="5" fill="none" stroke="#bb9af7" stroke-width="1.2" opacity="0.7"/>
      <circle cx="740" cy="250" r="5" fill="none" stroke="#bb9af7" stroke-width="1.2" opacity="0.7"/>
      <circle cx="740" cy="310" r="5" fill="none" stroke="#bb9af7" stroke-width="1.2" opacity="0.7"/>

      <!-- Output layer -->
      <circle cx="820" cy="165" r="6" fill="none" stroke="#e0af68" stroke-width="1.5" opacity="0.9"/>
      <circle cx="820" cy="250" r="6" fill="none" stroke="#e0af68" stroke-width="1.5" opacity="0.9"/>
    </g>

    <!-- Connections - input to h1 -->
    <g stroke="#00d4ff" stroke-width="0.4" opacity="0.15">
      <line x1="585" y1="90" x2="655" y2="110"/>
      <line x1="585" y1="90" x2="655" y2="165"/>
      <line x1="585" y1="90" x2="655" y2="215"/>
      <line x1="585" y1="140" x2="655" y2="110"/>
      <line x1="585" y1="140" x2="655" y2="165"/>
      <line x1="585" y1="140" x2="655" y2="265"/>
      <line x1="585" y1="190" x2="655" y2="110"/>
      <line x1="585" y1="190" x2="655" y2="215"/>
      <line x1="585" y1="190" x2="655" y2="265"/>
      <line x1="585" y1="240" x2="655" y2="165"/>
      <line x1="585" y1="240" x2="655" y2="215"/>
      <line x1="585" y1="240" x2="655" y2="315"/>
      <line x1="585" y1="290" x2="655" y2="215"/>
      <line x1="585" y1="290" x2="655" y2="265"/>
      <line x1="585" y1="290" x2="655" y2="315"/>
      <line x1="585" y1="340" x2="655" y2="265"/>
      <line x1="585" y1="340" x2="655" y2="315"/>
    </g>
    <!-- h1 to h2 -->
    <g stroke="#7aa2f7" stroke-width="0.4" opacity="0.15">
      <line x1="665" y1="110" x2="735" y2="130"/>
      <line x1="665" y1="110" x2="735" y2="190"/>
      <line x1="665" y1="165" x2="735" y2="130"/>
      <line x1="665" y1="165" x2="735" y2="190"/>
      <line x1="665" y1="165" x2="735" y2="250"/>
      <line x1="665" y1="215" x2="735" y2="190"/>
      <line x1="665" y1="215" x2="735" y2="250"/>
      <line x1="665" y1="265" x2="735" y2="250"/>
      <line x1="665" y1="265" x2="735" y2="310"/>
      <line x1="665" y1="315" x2="735" y2="250"/>
      <line x1="665" y1="315" x2="735" y2="310"/>
    </g>
    <!-- h2 to output -->
    <g stroke="#bb9af7" stroke-width="0.4" opacity="0.15">
      <line x1="745" y1="130" x2="814" y2="165"/>
      <line x1="745" y1="190" x2="814" y2="165"/>
      <line x1="745" y1="190" x2="814" y2="250"/>
      <line x1="745" y1="250" x2="814" y2="165"/>
      <line x1="745" y1="250" x2="814" y2="250"/>
      <line x1="745" y1="310" x2="814" y2="250"/>
    </g>

    <!-- Animated signal pulse on neural net -->
    <circle r="3" fill="#00d4ff" filter="url(#glow-cyan)" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.4;0.5" dur="5s" repeatCount="indefinite"/>
      <animateMotion dur="5s" repeatCount="indefinite" calcMode="linear"
        path="M580,140 L660,110 L740,130 L820,165"/>
    </circle>
    <circle r="3" fill="#7aa2f7" filter="url(#glow-cyan)" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.4;0.5" dur="5s" begin="1.5s" repeatCount="indefinite"/>
      <animateMotion dur="5s" begin="1.5s" repeatCount="indefinite" calcMode="linear"
        path="M580,290 L660,215 L740,250 L820,250"/>
    </circle>
    <circle r="3" fill="#bb9af7" filter="url(#glow-cyan)" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.4;0.5" dur="5s" begin="3s" repeatCount="indefinite"/>
      <animateMotion dur="5s" begin="3s" repeatCount="indefinite" calcMode="linear"
        path="M580,190 L660,265 L740,310 L820,250"/>
    </circle>
  </g>

  <!-- ═══════════════════ CENTER DIVIDER LINE ═══════════════════ -->
  <line x1="450" y1="20" x2="450" y2="430" stroke="#00d4ff" stroke-width="0.5" opacity="0.2" stroke-dasharray="4,8"/>

  <!-- ═══════════════════ MAIN TEXT BLOCK ═══════════════════ -->

  <!-- Top label -->
  <text x="30" y="32" font-family="'Courier New', monospace" font-size="9" fill="#00d4ff" opacity="0.5" letter-spacing="4">RESEARCHER PROFILE // SYSTEM v2026.05 // ACTIVE</text>

  <!-- NAME — massive, geometric -->
  <text x="28" y="215" font-family="'Courier New', monospace" font-weight="900" font-size="52" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.9" letter-spacing="-1" filter="url(#glow-cyan)">GURU</text>
  <text x="28" y="270" font-family="'Courier New', monospace" font-weight="900" font-size="52" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.9" letter-spacing="-1" filter="url(#glow-cyan)">PRASAATH</text>

  <!-- Name fill — amber offset for depth -->
  <text x="30" y="217" font-family="'Courier New', monospace" font-weight="900" font-size="52" fill="#e0af68" opacity="0.07" letter-spacing="-1">GURU</text>
  <text x="30" y="272" font-family="'Courier New', monospace" font-weight="900" font-size="52" fill="#e0af68" opacity="0.07" letter-spacing="-1">PRASAATH</text>

  <!-- Role line -->
  <text x="28" y="295" font-family="'Courier New', monospace" font-size="11" fill="#7aa2f7" opacity="0.85" letter-spacing="3">AI RESEARCHER  ×  PHYSICS-ML ENGINEER  ×  INDIA</text>

  <!-- Animated underline -->
  <line x1="28" y1="300" x2="28" y2="300" stroke="#00d4ff" stroke-width="1.5" opacity="0.8">
    <animate attributeName="x2" from="28" to="420" dur="2s" fill="freeze" begin="0.5s"/>
  </line>

  <!-- Domain tags -->
  <g font-family="'Courier New', monospace" font-size="9" fill="#00d4ff" opacity="0.6" letter-spacing="2">
    <text x="28" y="330">[ PINNs ]  [ QML ]  [ DIGITAL TWINS ]  [ MLOps ]</text>
    <text x="28" y="348">[ CAUSAL AI ]  [ AEROSPACE PROGNOSTICS ]</text>
  </g>

  <!-- Bottom status bar -->
  <rect x="0" y="430" width="900" height="20" fill="#00d4ff" opacity="0.04"/>
  <line x1="0" y1="430" x2="900" y2="430" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>

  <g font-family="'Courier New', monospace" font-size="8" fill="#00d4ff" opacity="0.4" letter-spacing="2">
    <text x="16" y="443">STATUS: BUILDING</text>
    <text x="160" y="443">COMMITS: 366+</text>
    <text x="290" y="443">PROJECTS: UTDTB · THERMPINN · CAUSALNERVE · ALIEN-PHYSICS</text>
    <text x="730" y="443">LOC: ∞</text>
  </g>

  <!-- Blinking cursor -->
  <rect x="815" y="434" width="7" height="10" fill="#00d4ff" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner brackets - top left -->
  <g stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.4">
    <polyline points="8,25 8,8 25,8"/>
    <polyline points="875,8 892,8 892,25"/>
    <polyline points="8,425 8,442 25,442"/>
    <polyline points="875,442 892,442 892,425"/>
  </g>

  <!-- Floating equation 1 - drifts up slowly -->
  <text font-family="'Courier New', monospace" font-size="10" fill="#00d4ff" opacity="0" letter-spacing="1">
    <animate attributeName="opacity" values="0;0.35;0.35;0" keyTimes="0;0.1;0.8;1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y" from="400" to="150" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x" values="60;65;60" dur="8s" repeatCount="indefinite"/>
    ∂u/∂t = α∇²u
  </text>

  <!-- Floating equation 2 -->
  <text font-family="'Courier New', monospace" font-size="9" fill="#7aa2f7" opacity="0" letter-spacing="1">
    <animate attributeName="opacity" values="0;0.3;0.3;0" keyTimes="0;0.1;0.8;1" dur="10s" begin="3s" repeatCount="indefinite"/>
    <animate attributeName="y" from="410" to="120" dur="10s" begin="3s" repeatCount="indefinite"/>
    <animate attributeName="x" values="100;108;100" dur="10s" begin="3s" repeatCount="indefinite"/>
    L(θ) = L_data + λ·L_physics
  </text>

  <!-- Floating equation 3 -->
  <text font-family="'Courier New', monospace" font-size="9" fill="#bb9af7" opacity="0" letter-spacing="1">
    <animate attributeName="opacity" values="0;0.28;0.28;0" keyTimes="0;0.1;0.8;1" dur="7s" begin="5s" repeatCount="indefinite"/>
    <animate attributeName="y" from="395" to="100" dur="7s" begin="5s" repeatCount="indefinite"/>
    <animate attributeName="x" values="340;348;340" dur="7s" begin="5s" repeatCount="indefinite"/>
    RUL = f(z_t | θ, physics)
  </text>

  <!-- Glitch effect on name - brief flicker -->
  <text x="28" y="215" font-family="'Courier New', monospace" font-weight="900" font-size="52" fill="#f7768e" opacity="0" letter-spacing="-1">GURU</text>

</svg>
