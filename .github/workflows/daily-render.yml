name: Daily Live Renders

on:
  schedule:
    # Run once a day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: pinn-render
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Automatically caches based on requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run PINN training
        run: |
          python render_pde.py

      - name: Generate PINN SVG
        run: |
          python render_svg.py

      - name: Run Causal Graph simulation & rendering
        run: |
          python render_causal.py

      - name: Run PINN failure mode training & rendering
        run: |
          python render_failure.py

      - name: Run PHASE live status rendering
        run: |
          python render_phase.py

      - name: Run TICSC vs Self-Attention benchmark & rendering
        run: |
          python benchmark_ticsc.py

      - name: Run ThermoPINN RUL inference & rendering
        run: |
          python render_thermopinn.py

      - name: Run CausalNerve live streaming & rendering
        run: |
          python render_causalnerve.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/pinn-live.svg assets/causal-live.svg assets/zugzwang-live.svg assets/phase-live.svg assets/phase_status.json assets/ticsc-live.svg assets/ticsc_benchmark.json assets/thermopinn-live.svg assets/causalnerve-live.svg
          git diff --staged --quiet || (git commit -m "chore: refresh live renders" && git push)
